# Expects MATERIAL in workflow context. Resolves unique elements and loads Standata
# elemental bank materials (tags: elemental, metadata.element) for each.
application:
  name: shell
method:
  name: UnknownMethod
model:
  name: UnknownModel
name: Get Elemental Materials
units:
  - type: assignment
    config:
      name: assign-elements
      flowchartId: assign-elements
      operand: ELEMENTS
      value: "sorted(list(set([e['value'] for e in MATERIAL.basis.elements])))"
  - type: assertion
    config:
      name: assert-elements
      flowchartId: assert-elements
      statement: "len(ELEMENTS) > 0"
      errorMessage: Material has no elements in its basis.
  - type: io
    config:
      name: io-elemental-materials
      flowchartId: io-elemental-materials
      subtype: input
      source: api
      input:
        - endpoint: materials
          endpoint_options:
            params:
              query: "{'tags': 'elemental', 'metadata.element': {'$in': ELEMENTS}}"
              projection: "{}"
          name: DATA
  - type: assignment
    config:
      name: assign-element-materials
      flowchartId: assign-element-materials
      operand: ELEMENT_MATERIALS
      value: >-
        {m['metadata']['element']: m for m in DATA
        if m.get('metadata') and m['metadata'].get('element') in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-materials
  - type: assertion
    config:
      name: assert-element-materials
      flowchartId: assert-element-materials
      statement: "set(ELEMENT_MATERIALS.keys()) == set(ELEMENTS)"
      errorMessage: >-
        Elemental reference material(s) not found on the Platform. Import missing
        elements from Standata Materials Bank (tags: elemental, metadata.element).
