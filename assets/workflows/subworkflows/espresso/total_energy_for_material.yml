# Runs QE SCF on the compound material.
#
# In:  MATERIAL
# Out: total_energy (property)  compound total energy (eV) from pw.x
application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Total Energy For Material - QE
units:
  - config:
      execName: pw.x
      flavorName: pw_scf
      flowchartId: pw-scf
      name: pw_scf
    type: executionBuilder
