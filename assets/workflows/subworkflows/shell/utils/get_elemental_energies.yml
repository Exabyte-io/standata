# Expects MATERIAL, ELEMENTS, ELEMENT_MATERIALS, PRECISION_VALUE, and PRECISION_METRIC.
# PRECISION_* come from total_energy_for_material (compound pw_scf kgrid settings).
# Fetches elemental total_energy properties; prefers exact KPPRA match, else any bank TE.
application:
  name: shell
method:
  name: UnknownMethod
model:
  name: UnknownModel
name: Get Elemental Energies
units:
  - type: assertion
    config:
      name: assert-precision-target
      flowchartId: assert-precision-target
      statement: "PRECISION_VALUE is not None"
      errorMessage: >-
        'Could not read k-point precision from the compound total-energy calculation.'
        + ' Check pw_scf kgrid settings (gridMetricValue / gridMetricType).'
  - type: io
    config:
      name: io-elemental-energies
      flowchartId: io-elemental-energies
      subtype: input
      source: api
      input:
        - endpoint: refined-properties
          endpoint_options:
            params:
              query: >-
                {'exabyteId': {'$in': [ELEMENT_MATERIALS[el].exabyteId for el in ELEMENTS]},
                'slug': 'total_energy'}
              projection: >-
                {'sort': {'precision.value': -1},
                'limit': min(500, max(20, len(ELEMENTS) * 10))}
          name: DATA
  - type: assignment
    config:
      name: assign-elemental-energies
      flowchartId: assign-elemental-energies
      operand: E_ELEMENTAL_BY_SYMBOL
      value: >-
        {el: ([d.data.value for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)
        and d.precision.metric == PRECISION_METRIC
        and d.precision.value == PRECISION_VALUE]
        or [d.data.value for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)]
        or [None])[0]
        for el in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-elemental-te-used-by-symbol
      flowchartId: assign-elemental-te-used-by-symbol
      operand: ELEMENTAL_TE_USED_BY_SYMBOL
      value: >-
        {el: ([{'total_energy': d.data.value,
        'precision_value': d.precision.value,
        'precision_metric': d.precision.metric,
        'exabyteId': d.exabyteId,
        'exact_precision_match': True}
        for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)
        and d.precision.metric == PRECISION_METRIC
        and d.precision.value == PRECISION_VALUE]
        or [{'total_energy': d.data.value,
        'precision_value': d.precision.value,
        'precision_metric': d.precision.metric,
        'exabyteId': d.exabyteId,
        'exact_precision_match': False}
        for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)]
        or [None])[0]
        for el in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-missing-elemental-energies-no-te
      flowchartId: assign-missing-elemental-energies-no-te
      operand: MISSING_ELEMENTAL_ENERGIES_NO_TE
      value: >-
        [el for el in ELEMENTS
        if not any((d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId) for d in DATA)]
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-missing-elemental-energies-wrong-precision
      flowchartId: assign-missing-elemental-energies-wrong-precision
      operand: MISSING_ELEMENTAL_ENERGIES_WRONG_PRECISION
      value: >-
        [el for el in ELEMENTS
        if el not in MISSING_ELEMENTAL_ENERGIES_NO_TE
        and not any((d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)
        and d.precision.metric == PRECISION_METRIC
        and d.precision.value == PRECISION_VALUE for d in DATA)]
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-available-elemental-precisions
      flowchartId: assign-available-elemental-precisions
      operand: AVAILABLE_ELEMENTAL_PRECISIONS_BY_SYMBOL
      value: >-
        {el: sorted(set(str(d.precision.value) + ' ' + str(d.precision.metric)
        for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)))
        for el in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-precision-mismatch-info
      flowchartId: assign-precision-mismatch-info
      operand: PRECISION_MISMATCH_INFO
      logResult: true
      value: >-
        {'required_precision': {'value': PRECISION_VALUE, 'metric': PRECISION_METRIC},
        'exact_match_elements': [el for el in ELEMENTS
        if el not in MISSING_ELEMENTAL_ENERGIES_WRONG_PRECISION
        and el not in MISSING_ELEMENTAL_ENERGIES_NO_TE],
        'missing_te': MISSING_ELEMENTAL_ENERGIES_NO_TE,
        'wrong_precision': MISSING_ELEMENTAL_ENERGIES_WRONG_PRECISION,
        'available_precisions': AVAILABLE_ELEMENTAL_PRECISIONS_BY_SYMBOL}
  - type: assignment
    config:
      name: assign-formation-energy-precision-report
      flowchartId: assign-formation-energy-precision-report
      operand: FORMATION_ENERGY_PRECISION_REPORT
      logResult: true
      value: >-
        {'compound': {'precision_value': PRECISION_VALUE,
        'precision_metric': PRECISION_METRIC},
        'elemental': ELEMENTAL_TE_USED_BY_SYMBOL,
        'precision_mismatch': PRECISION_MISMATCH_INFO}
  - type: assignment
    config:
      name: assign-elemental-energies-no-te-error
      flowchartId: assign-elemental-energies-no-te-error
      operand: ELEMENTAL_ENERGIES_NO_TE_ERROR_MSG
      value: >-
        'Missing elemental total_energy for: '
        + ', '.join(MISSING_ELEMENTAL_ENERGIES_NO_TE)
        + '. Run QE total energy on Standata elemental materials (tags: elemental).'
        + ' exabyteIds: '
        + ', '.join([el + '=' + ELEMENT_MATERIALS[el].exabyteId for el in
        MISSING_ELEMENTAL_ENERGIES_NO_TE])
  - type: assertion
    config:
      name: assert-elemental-energies-no-te
      flowchartId: assert-elemental-energies-no-te
      statement: "len(MISSING_ELEMENTAL_ENERGIES_NO_TE) == 0"
      errorMessage: >-
        'Missing elemental total_energy for: '
        + ', '.join(MISSING_ELEMENTAL_ENERGIES_NO_TE)
        + '. Run QE total energy on Standata elemental materials (tags: elemental).'
        + ' exabyteIds: '
        + ', '.join([el + '=' + ELEMENT_MATERIALS[el].exabyteId for el in
        MISSING_ELEMENTAL_ENERGIES_NO_TE])
  - type: assignment
    config:
      name: assign-elemental-energy-sum
      flowchartId: assign-elemental-energy-sum
      operand: E_ELEMENTAL_SUM
      value: >-
        sum(E_ELEMENTAL_BY_SYMBOL[e['value']]
        / len(ELEMENT_MATERIALS[e['value']].basis.elements)
        for e in MATERIAL.basis.elements)
