# Expects E_MATERIAL, E_ELEMENTAL_SUM, and MATERIAL in context.
# E_ELEMENTAL_SUM is set by get_elemental_energies (sum of E_ref/n_ref per atom in MATERIAL.basis).
# Per cell: E_form = E_tot(material) - sum_i E_tot(element_i ref) / n_i.
application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Formation Energy - QE
units:
  - type: assignment
    config:
      name: assign-formation-energy
      flowchartId: assign-formation-energy
      operand: FORMATION_ENERGY
      value: "E_MATERIAL - E_ELEMENTAL_SUM"
      results:
        - name: formation_energy
