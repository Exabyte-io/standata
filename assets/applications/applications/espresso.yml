name: espresso
shortName: qe
summary: Quantum ESPRESSO
defaultVersion: '6.3'
versions:
  #### version 6.3 ####
  - version: '6.3'
    # This sets the default build for each version
    isDefault: true
    build: GNU
    hasAdvancedComputeOptions: true
    buildConfig:
      moduleName: '6.3-gnu'
      imageName: 'espresso'
      imageTag: '6.3-gnu-0'
      bio: 'Quantum ESPRESSO 6.3 (GCC 11.5.0, OpenMPI 4.1.1 and OpenBLAS)'
      dependencies:
        - 'mpi/ompi-4.1.1'
      environmentVariables: {}
  #### version 7.5 ####
  - version: '7.5'
    isDefault: true
    build: GNU
    hasAdvancedComputeOptions: true
    buildConfig:
      moduleName: '7.5-gnu'
      imageName: 'espresso'
      imageTag: '7.5-gnu-0'
      bio: 'Quantum ESPRESSO 7.5 (GCC 11.5.0, OpenMPI 4.1.1 and OpenBLAS)'
      dependencies:
        - 'mpi/ompi-4.1.1'
      environmentVariables: {}
  - version: '7.5'
    isDefault: false
    build: CUDA
    hasAdvancedComputeOptions: true
    buildConfig:
      moduleName: '7.5-cuda-12.8'
      imageName: 'espresso'
      imageTag: '7.5-host-cuda-12.8-0'
      bio: 'Quantum ESPRESSO 7.5 (CUDA 12.8)'
      dependencies: []
      environmentVariables:
        SOFTWARE_LIBRARIES_PATH: '/export/compute/software/libraries'
        SOFTWARE_COMPILERS_PATH: '/export/compute/software/compilers'
        APPTAINERENV_PREPEND_PATH: '$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/hcoll/bin:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ompi/bin:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/bin:$env(SOFTWARE_COMPILERS_PATH)/compilers/gcc/11.2.0/bin'
        APPTAINERENV_LD_LIBRARY_PATH: '$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/hcoll/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ompi/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/nccl_rdma_sharp_plugin/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/sharp/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/lib/ucx:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/nccl/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/compilers/lib:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/cuda/12.8/lib64:$env(SOFTWARE_LIBRARIES_PATH)/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/math_libs/12.8/lib64:$env(SOFTWARE_COMPILERS_PATH)/gcc/11.2.0/lib64:\${LD_LIBRARY_PATH}'
