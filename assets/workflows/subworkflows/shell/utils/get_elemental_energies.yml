# Expects MATERIAL, ELEMENTS, and ELEMENT_MATERIALS in context.
# Fetches total_energy refined properties for all elemental reference exabyteIds,
# then assigns one TE per element in E_ELEMENTAL_BY_SYMBOL (keyed by symbol).
# Per-element TE is chosen in assign-elemental-energies by filtering DATA on each
# ELEMENT_MATERIALS[el].exabyteId and taking the highest-precision match ([0] after sort).
application:
  name: shell
method:
  name: UnknownMethod
model:
  name: UnknownModel
name: Get Elemental Energies
units:
  - type: io
    config:
      name: io-elemental-energies
      flowchartId: io-elemental-energies
      subtype: input
      source: api
      input:
        - type: api
          endpoint: refined-properties
          endpoint_options:
            params:
              query: >-
                {'exabyteId': {'$in': [ELEMENT_MATERIALS[el].exabyteId for el in ELEMENTS]},
                'slug': 'total_energy'}
              projection: >-
                {'sort': {'precision.value': -1},
                'limit': min(500, max(20, len(ELEMENTS) * 10))}
          name: DATA
  - type: assignment
    config:
      name: assign-elemental-energies
      flowchartId: assign-elemental-energies
      operand: E_ELEMENTAL_BY_SYMBOL
      value: >-
        {el: ([d.data.value for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)] or [None])[0]
        for el in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-elemental-energy-sum
      flowchartId: assign-elemental-energy-sum
      operand: E_ELEMENTAL_SUM
      value: >-
        sum(E_ELEMENTAL_BY_SYMBOL[e['value']]
        / len(ELEMENT_MATERIALS[e['value']].basis.elements)
        for e in MATERIAL.basis.elements)
