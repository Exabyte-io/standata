# Valence band offset for a polar interface via linear fits of the
# macroscopically averaged electrostatic potential in the slab regions.
#
# The workflow assumes 3 structures being present:
#   - Interface
#   - Interface Left
#   - Interface Right
#
# It reuses the existing band structure + average ESP subworkflow for all three
# materials, then runs a custom Python post-processing step that:
#   - optionally uses user-provided z-boundaries for left/right slab regions
#   - otherwise auto-detects slab boundaries from the structures
#   - fits the ESP in each slab region
#   - computes the polar lineup correction and the final VBO
#   - stores a PNG visualizing the fitted interface ESP

name: Valence Band Offset (Polar)
config:
  attributes:
    isMultiMaterial: true
units:
  - name: average_electrostatic_potential_via_band_structure
    type: subworkflow
    config:
      attributes:
        name: BS + Avg ESP (Interface)
    unitConfigs:
      - index: 0
        type: assignment
        config:
          attributes:
            name: Set Material Index (Interface)
            value: "0"

  - name: average_electrostatic_potential_via_band_structure
    type: subworkflow
    config:
      attributes:
        name: BS + Avg ESP (Interface left)
    unitConfigs:
      - index: 0
        type: assignment
        config:
          attributes:
            name: Set Material Index (Interface left)
            value: "1"
      - index: 2
        type: executionBuilder
        config:
          attributes:
            flowchartId: pw-bands-calculate-band-gap-left
      - index: 3
        type: assignment
        config:
          attributes:
            input:
              - name: band_gaps
                scope: pw-bands-calculate-band-gap-left
      - index: 4
        type: assignment
        config:
          attributes:
            operand: VBM_LEFT
      - index: 7
        type: executionBuilder
        config:
          attributes:
            flowchartId: average-electrostatic-potential-left
      - index: 8
        type: assignment
        config:
          attributes:
            input:
              - name: average_potential_profile
                scope: average-electrostatic-potential-left

  - name: average_electrostatic_potential_via_band_structure
    type: subworkflow
    config:
      attributes:
        name: BS + Avg ESP (Interface right)
    unitConfigs:
      - index: 0
        type: assignment
        config:
          attributes:
            name: Set Material Index (Interface right)
            value: "2"
      - index: 2
        type: executionBuilder
        config:
          attributes:
            flowchartId: pw-bands-calculate-band-gap-right
      - index: 3
        type: assignment
        config:
          attributes:
            input:
              - name: band_gaps
                scope: pw-bands-calculate-band-gap-right
      - index: 4
        type: assignment
        config:
          attributes:
            operand: VBM_RIGHT
      - index: 7
        type: executionBuilder
        config:
          attributes:
            flowchartId: average-electrostatic-potential-right
      - index: 8
        type: assignment
        config:
          attributes:
            input:
              - name: average_potential_profile
                scope: average-electrostatic-potential-right

  - name: valence_band_offset_calc_for_polar_materials
    type: subworkflow
