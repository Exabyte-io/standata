# Runs QE SCF on compound material and computes formation energy (eV/atom).
#
# In:  MATERIAL, ELEMENTS, ELEMENT_MATERIALS
# Out: total_energy (property)     compound total energy (eV) from pw.x
#      E_MATERIAL                  compound total energy (eV) in global scope
#      E_ELEMENTAL_BY_SYMBOL       map symbol -> total_energy (eV) of that ref, highest precision
#      E_ELEMENTAL_SUM             sum over compound atoms of (ref total_energy / ref atom count)
#      formation_energy (property) (E_MATERIAL - E_ELEMENTAL_SUM) / N_atoms, eV/atom
application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Compute Formation Energy
properties:
  - atomic_forces
  - fermi_energy
  - formation_energy
  - pressure
  - stress_tensor
  - total_energy
  - total_energy_contributions
  - total_force
units:
  - config:
      execName: pw.x
      flavorName: pw_scf
      flowchartId: pw-scf
      name: pw_scf
    type: executionBuilder
  - type: assignment
    config:
      name: assign-e-material
      flowchartId: assign-e-material
      operand: E_MATERIAL
      value: total_energy
      input:
        - name: total_energy
          scope: pw-scf
  - type: io
    config:
      name: io-elemental-energies
      flowchartId: io-elemental-energies
      subtype: input
      source: api
      input:
        - type: api
          endpoint: refined-properties
          endpoint_options:
            params:
              query: >-
                {'exabyteId': {'$in': [ELEMENT_MATERIALS[el].exabyteId for el in ELEMENTS]},
                'slug': 'total_energy'}
              projection: >-
                {'sort': {'precision.value': -1},
                'limit': min(500, max(20, len(ELEMENTS) * 10))}
          name: DATA
  - type: assignment
    config:
      name: assign-elemental-energies
      flowchartId: assign-elemental-energies
      operand: E_ELEMENTAL_BY_SYMBOL
      value: >-
        {el: ([d.data.value for d in DATA
        if (d.exabyteId == ELEMENT_MATERIALS[el].exabyteId
        or ELEMENT_MATERIALS[el].exabyteId in d.exabyteId)] or [None])[0]
        for el in ELEMENTS}
      input:
        - name: DATA
          scope: io-elemental-energies
  - type: assignment
    config:
      name: assign-elemental-energy-sum
      flowchartId: assign-elemental-energy-sum
      operand: E_ELEMENTAL_SUM
      value: >-
        sum(E_ELEMENTAL_BY_SYMBOL[e['value']]
        / len(ELEMENT_MATERIALS[e['value']].basis.elements)
        for e in MATERIAL.basis.elements)
  - type: assignment
    config:
      name: assign-formation-energy
      flowchartId: assign-formation-energy
      operand: FORMATION_ENERGY
      value: "(E_MATERIAL - E_ELEMENTAL_SUM) / len(MATERIAL.basis.elements)"
      results:
        - name: formation_energy
