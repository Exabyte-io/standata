# Attach a material (MATERIAL_ID). Derives ELEMENT_SYMBOL, finds the Standata
# elemental reference by metadata.element, and sets MU from its total_energy.
name: Get Chemical Potential
units:
  - name: get_chemical_potential
    type: subworkflow
    unitConfigs:
      - index: 8
        type: io
        config:
          attributes:
            input:
              - endpoint: refined-properties
                endpoint_options:
                  params:
                    query: >-
                      {'exabyteId': ELEMENT_MATERIAL.exabyteId,
                      'data.name': 'total_energy'}
                    projection: "{'sort': {'precision.value': -1}, 'limit': 1}"
                name: DATA
