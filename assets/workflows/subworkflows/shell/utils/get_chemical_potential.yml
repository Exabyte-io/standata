# Loads MATERIAL from MATERIAL_ID, derives ELEMENT_SYMBOL from its composition,
# finds the elemental reference material on the Platform by metadata.element,
# and assigns MU (chemical potential) from its total energy refined property.
# APP is a placeholder replaced by an app shortname in the parent workflow yaml.
application:
  name: shell
method:
  name: UnknownMethod
model:
  name: UnknownModel
name: Get Chemical Potential
units:
  - type: io
    config:
      name: io-material
      flowchartId: io-material
      subtype: input
      source: api
      input:
        - endpoint: materials
          endpoint_options:
            params:
              query: "{'_id': MATERIAL_ID}"
              projection: "{}"
          name: DATA
  - type: assignment
    config:
      name: assign-material
      flowchartId: assign-material
      operand: MATERIAL
      value: "DATA[0] if DATA else None"
      input:
        - name: DATA
          scope: io-material
  - type: assertion
    config:
      name: assert-material
      flowchartId: assert-material
      statement: "MATERIAL != None"
      errorMessage: Workflow material not found on the Platform.
  - type: assignment
    config:
      name: assign-element-symbol
      flowchartId: assign-element-symbol
      operand: ELEMENT_SYMBOL
      value: "list(set([e['value'] for e in MATERIAL.basis.elements]))[0]"
  - type: assertion
    config:
      name: assert-single-element
      flowchartId: assert-single-element
      statement: "len(set([e['value'] for e in MATERIAL.basis.elements])) == 1"
      errorMessage: >-
        Material must contain a single element type. For compounds, use a parent
        workflow that sets MU per element.
  - type: io
    config:
      name: io-element-material
      flowchartId: io-element-material
      subtype: input
      source: api
      input:
        - endpoint: materials
          endpoint_options:
            params:
              query: "{'metadata.element': ELEMENT_SYMBOL}"
              projection: "{}"
          name: DATA
  - type: assignment
    config:
      name: assign-element-material
      flowchartId: assign-element-material
      operand: ELEMENT_MATERIAL
      value: "DATA[0] if DATA else None"
      input:
        - name: DATA
          scope: io-element-material
  - type: assertion
    config:
      name: assert-element-material
      flowchartId: assert-element-material
      statement: "ELEMENT_MATERIAL != None"
      errorMessage: >-
        Elemental reference material for ELEMENT_SYMBOL not found on the Platform.
        Upload it from Standata first.
  - type: io
    config:
      name: io-chemical-potential
      flowchartId: io-chemical-potential
      subtype: input
      source: api
      input:
        - endpoint: refined-properties
          endpoint_options:
            params:
              query: "{'exabyteId': ELEMENT_MATERIAL.exabyteId, 'data.name': 'total_energy', 'group': {'$regex': 'APP:'}}"
              projection: "{'sort': {'precision.value': -1}, 'limit': 1}"
          name: DATA
  - type: assignment
    config:
      name: assign-mu
      flowchartId: assign-mu
      operand: MU
      value: "DATA[0].data.value if DATA else None"
      input:
        - name: DATA
          scope: io-chemical-potential
  - type: assertion
    config:
      name: assert-mu
      flowchartId: assert-mu
      statement: "MU != None"
      errorMessage: >-
        Total energy not found for the elemental reference material. Run total
        energy on the Standata elemental material (metadata.element), not only on
        a job final structure.
