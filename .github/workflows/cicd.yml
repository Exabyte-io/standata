name: Continuous Testing and Publication

on: # yamllint disable-line rule:truthy
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-pyproject-for-pypi:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate pyproject publishability
        run: |
          if grep -En '^\s*"[^"]+\s@\s*(git\+|hg\+|svn\+|bzr\+|https://|http://|ssh://|file://)|^\s*"(git\+|hg\+|svn\+|bzr\+|https://|http://|ssh://|file://)' pyproject.toml; then
            echo "pyproject.toml contains direct URL/VCS dependencies that PyPI will reject."
            exit 1
          fi
          echo "pyproject.toml publishability check passed."

  run-py-linter:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: [3.10.13]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Checkout actions repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Exabyte-io/actions
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: actions

      - name: Run Yaml linter
        uses: ./actions/yaml/lint
        with:
          python-version: ${{ matrix.python-version }}
          targets: ./assets

      - name: Run ruff linter
        uses: ./actions/py/lint
        with:
          python-version: ${{ matrix.python-version }}

  run-py-tests:
    if: github.event_name == 'push'
    needs: run-py-linter
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version:
          - 3.10.x
          - 3.11.x
          - 3.12.x
          - 3.13.x

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Checkout actions repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Exabyte-io/actions
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: actions

      - name: Run python unit tests
        uses: ./actions/py/pytest
        with:
          python-version: ${{ matrix.python-version }}
          unit-test-directory: tests/py/unit

  run-js-tests:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Checkout actions repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Exabyte-io/actions
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: actions

      - name: Run JS validate
        uses: ./actions/js/validate
        with:
          node-version: ${{ matrix.node-version }}
          skip-eslint: 'true'

      - name: Run JS tests
        uses: ./actions/js/test
        with:
          node-version: ${{ matrix.node-version }}

  publish-js-package:
    needs: [run-js-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.repository != 'Exabyte-io/template-definitions-js-py') && (github.ref_name == 'main')

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout actions repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Exabyte-io/actions
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: actions

      - name: Publish JS release
        uses: ./actions/js/publish
        with:
          node-version: 20.x
          npm-token: ${{ secrets.NPM_TOKEN }}
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          publish-tag: 'true'

  publish-py-package:
    needs: [publish-js-package]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.repository != 'Exabyte-io/template-definitions-js-py') && (github.ref_name == 'main')

    steps:
      - name: Checkout this repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Checkout actions repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Exabyte-io/actions
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          path: actions

      - name: Publish python release
        uses: ./actions/py/publish
        with:
          python-version: 3.10.13
          github-token: ${{ secrets.BOT_GITHUB_TOKEN }}
          pypi-api-token: ${{ secrets.PYPI_API_TOKEN }}
          publish-tag: 'false'
