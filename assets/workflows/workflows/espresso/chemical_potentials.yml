# Loads MATERIAL, derives unique elements, maps over each to export chemical_potential
# (one map sub-job per element). No QE run.
name: Chemical Potentials
properties:
  - chemical_potential
units:
  - name: shell/utils/get_material_by_id
    type: subworkflow
  - name: shell/utils/assign_elements_from_material
    type: subworkflow
  - config:
      functions:
        setDefaultCompute: null
      input:
        name: ELEMENTS
        target: ELEMENT_SYMBOL
      mapUnit: true
    name: chemical_potentials_map_workflow
    type: workflow
    units:
      - name: chemical_potential_for_element
        type: subworkflow
