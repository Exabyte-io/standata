name: espresso
shortName: qe
summary: Quantum ESPRESSO
defaultVersion: '6.3'
versions:
  #### version 6.3 ####
  - version: '6.3'
    # This sets the default build for each version
    isDefault: true
    build: GNU
    hasAdvancedComputeOptions: true
    build_config:
      module_name: '6.3-gnu'
      image_name: 'espresso'
      image_tag: '6.3-gnu-0'
      bio: 'Quantum ESPRESSO 6.3 (GCC 11.5.0, OpenMPI 4.1.1 and OpenBLAS)'
      dependencies:
        - 'mpi/ompi-4.1.1'
      environment_variables: {}
  #### version 7.5 ####
  - version: '7.5'
    isDefault: true
    build: CUDA
    hasAdvancedComputeOptions: true
    build_config:
      module_name: '7.5-cuda-12.8'
      image_name: 'espresso'
      image_tag: '7.5-host-cuda-12.8-0'
      bio: 'Quantum ESPRESSO 7.5 (CUDA 12.8)'
      dependencies: []
      environment_variables:
        SOFTWARE_LIBRARIES_PATH: '/export/compute/software/libraries'
        SOFTWARE_COMPILERS_PATH: '/export/compute/software/compilers'
        APPTAINERENV_PREPEND_PATH: '${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/hcoll/bin:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ompi/bin:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/bin:${SOFTWARE_COMPILERS_PATH}/compilers/gcc/11.2.0/bin'
        APPTAINERENV_LD_LIBRARY_PATH: '${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/hcoll/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ompi/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/nccl_rdma_sharp_plugin/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/sharp/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/hpcx/hpcx-2.22.1/ucx/mt/lib/ucx:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/comm_libs/12.8/nccl/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/compilers/lib:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/cuda/12.8/lib64:${SOFTWARE_LIBRARIES_PATH}/nvhpc-25.3-cuda-12.8/Linux_x86_64/25.3/math_libs/12.8/lib64:${SOFTWARE_COMPILERS_PATH}/gcc/11.2.0/lib64:\${LD_LIBRARY_PATH}'
