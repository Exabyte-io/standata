# Map child: ELEMENT_SYMBOL in context. Sets MU from elemental reference total_energy.
application:
  name: espresso
  version: "6.3"
method:
  name: PseudopotentialMethod
model:
  name: DFTModel
name: Chemical Potential For Element
units:
  - type: io
    config:
      name: io-element-material
      flowchartId: io-element-material
      subtype: input
      source: api
      input:
        - endpoint: materials
          endpoint_options:
            params:
              query: "{'metadata.element': ELEMENT_SYMBOL}"
              projection: "{}"
          name: DATA
  - type: assignment
    config:
      name: assign-element-material
      flowchartId: assign-element-material
      operand: ELEMENT_MATERIAL
      value: "DATA[0] if DATA else None"
      input:
        - name: DATA
          scope: io-element-material
  - type: assertion
    config:
      name: assert-element-material
      flowchartId: assert-element-material
      statement: "ELEMENT_MATERIAL != None"
      errorMessage: >-
        Elemental reference material not found on the Platform for ELEMENT_SYMBOL.
  - type: io
    config:
      name: io-chemical-potential
      flowchartId: io-chemical-potential
      subtype: input
      source: api
      input:
        - endpoint: refined-properties
          endpoint_options:
            params:
              query: >-
                {'exabyteId': ELEMENT_MATERIAL.exabyteId,
                'data.name': 'total_energy'}
              projection: "{'sort': {'precision.value': -1}, 'limit': 1}"
          name: DATA
  - type: assignment
    config:
      name: assign-mu
      flowchartId: assign-mu
      operand: MU
      value: "DATA[0].data.value if DATA else None"
      results:
        - name: chemical_potential
      input:
        - name: DATA
          scope: io-chemical-potential
  - type: assertion
    config:
      name: assert-mu
      flowchartId: assert-mu
      statement: "MU != None"
      errorMessage: >-
        Total energy not found for elemental reference ELEMENT_SYMBOL.
